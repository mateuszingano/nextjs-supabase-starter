name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Types, lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test

  rls:
    name: RLS isolation (local Supabase)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local Supabase (applies migrations + seed)
        run: supabase start
      # Local Supabase demo keys are fixed and public — they only work against 127.0.0.1.
      - name: Configure .env.test
        run: |
          cat > .env.test <<'EOF'
          SUPABASE_URL=http://127.0.0.1:54321
          SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6ImFub24iLCJleHAiOjE5ODM4MTI5OTZ9.CRXP1A7WOeoJeXxjNni43kdQwgnWNReilDMblYTn_I0
          SUPABASE_SERVICE_ROLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS1kZW1vIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImV4cCI6MTk4MzgxMjk5Nn0.EGIM96RAZx35lJzdJsyH-qQwv8Hdp7fsn3W0YpN81IU
          SUPABASE_DB_URL=postgresql://postgres:postgres@127.0.0.1:54322/postgres
          EOF
      - name: Run RLS isolation test (required — fails if the proof is skipped)
        run: npm run test:rls
        env:
          RLS_TESTS_REQUIRED: '1'
